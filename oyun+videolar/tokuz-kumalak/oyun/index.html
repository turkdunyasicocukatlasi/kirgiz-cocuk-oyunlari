<!doctype html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tokuz Kumalak</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: Arial, Helvetica, sans-serif;
        }

        .stage {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            background: #000;
        }

        video {
            width: 100vw;
            height: 100vh;
            display: block;
            object-fit: cover;
            background: #000;
        }

        .play-button,
        .start-overlay {
            position: fixed;
            left: 50%;
            border: 0;
            background: #fff;
            color: #000;
            font-weight: 800;
            letter-spacing: 0;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
            user-select: none;
        }

        .play-button {
            bottom: 7vh;
            min-width: min(640px, calc(100vw - 48px));
            min-height: 104px;
            padding: 22px 46px;
            transform: translateX(-50%);
            font-size: clamp(28px, 4vw, 54px);
            display: none;
        }

        .play-button.is-visible {
            display: block;
        }

        .start-overlay {
            top: 50%;
            padding: 20px 42px;
            transform: translate(-50%, -50%);
            font-size: clamp(22px, 3vw, 40px);
            display: none;
        }

        .start-overlay.is-visible {
            display: block;
        }
    </style>
</head>
<body>
    <main class="stage">
        <video id="introVideo" autoplay playsinline preload="auto"></video>
        <button id="playButton" class="play-button" type="button">HADİ OYNAYALIM</button>
        <button id="startOverlay" class="start-overlay" type="button">BAŞLAT</button>
    </main>

    <script>
        const sequence = [
            "videos/video1.mp4",
            "game/intro.mp4"
        ];

        const video = document.getElementById("introVideo");
        const playButton = document.getElementById("playButton");
        const startOverlay = document.getElementById("startOverlay");
        let currentVideoIndex = 0;

        function loadVideo(index) {
            currentVideoIndex = index;
            video.src = sequence[currentVideoIndex];
            video.load();
            playCurrentVideo();
        }

        function playCurrentVideo() {
            startOverlay.classList.remove("is-visible");
            const playPromise = video.play();

            if (playPromise && typeof playPromise.catch === "function") {
                playPromise.catch(() => {
                    startOverlay.classList.add("is-visible");
                });
            }
        }

        function showGameButton() {
            playButton.classList.add("is-visible");
        }

        video.addEventListener("ended", () => {
            if (currentVideoIndex === 0) {
                loadVideo(1);
                return;
            }

            showGameButton();
        });

        startOverlay.addEventListener("click", playCurrentVideo);

        playButton.addEventListener("click", () => {
            window.location.href = "game/index.html";
        });

        loadVideo(0);
    </script>
</body>
</html>
