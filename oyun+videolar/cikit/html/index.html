<!doctype html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Çikit Oyunu</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
            color: #fff7df;
            background: #17211a;
        }

        .stage {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            background:
                linear-gradient(180deg, rgba(0, 0, 0, 0.16), rgba(0, 0, 0, 0.38)),
                url("images/arka_plan-animation 1-000.png") center / cover no-repeat;
        }

        .hud {
            position: fixed;
            top: 22px;
            left: 22px;
            right: 22px;
            display: flex;
            justify-content: space-between;
            gap: 14px;
            align-items: center;
            z-index: 2;
        }

        .pill,
        .back-link {
            min-height: 44px;
            display: inline-grid;
            place-items: center;
            padding: 0 18px;
            border: 1px solid rgba(255, 235, 184, 0.7);
            border-radius: 999px;
            color: #fff7df;
            background: rgba(38, 32, 18, 0.68);
            box-shadow: 0 8px 22px rgba(0, 0, 0, 0.22);
            font-weight: 800;
            text-decoration: none;
        }

        .arena {
            position: relative;
            width: min(860px, 92vw);
            height: min(520px, 72vh);
        }

        .short-stick,
        .long-stick {
            position: absolute;
            left: 50%;
            transform-origin: center;
            user-select: none;
            pointer-events: none;
            filter: drop-shadow(0 12px 16px rgba(0, 0, 0, 0.34));
        }

        .short-stick {
            width: min(170px, 23vw);
            bottom: 128px;
            transform: translateX(-50%) rotate(-12deg);
            transition: transform 580ms cubic-bezier(.19, 1, .22, 1), bottom 580ms cubic-bezier(.19, 1, .22, 1);
        }

        .long-stick {
            width: min(420px, 58vw);
            bottom: 60px;
            transform: translateX(-48%) rotate(-5deg);
            transition: transform 220ms ease;
        }

        .long-stick.is-swinging {
            transform: translateX(-49%) rotate(-28deg);
        }

        .short-stick.is-flying {
            bottom: min(370px, 56vh);
            transform: translateX(calc(-50% + var(--flight, 0px))) rotate(610deg);
        }

        .controls {
            position: fixed;
            left: 50%;
            bottom: 32px;
            width: min(680px, calc(100vw - 32px));
            display: grid;
            gap: 14px;
            transform: translateX(-50%);
            z-index: 2;
        }

        .meter {
            height: 18px;
            overflow: hidden;
            border: 1px solid rgba(255, 235, 184, 0.72);
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.36);
        }

        .meter-fill {
            width: 0%;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, #86c773, #f0c15a, #ef744f);
        }

        .hit-button {
            min-height: 72px;
            border: 0;
            border-radius: 14px;
            color: #2a1b08;
            background: linear-gradient(180deg, #fff1b7, #dba344);
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.32);
            cursor: pointer;
            font-size: clamp(24px, 4vw, 44px);
            font-weight: 900;
        }

        .message {
            min-height: 28px;
            text-align: center;
            font-weight: 800;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.45);
        }

        @media (max-width: 560px) {
            .hud {
                top: 12px;
                left: 12px;
                right: 12px;
            }

            .pill,
            .back-link {
                min-height: 38px;
                padding: 0 12px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <main class="stage">
        <div class="hud">
            <a class="back-link" href="../../../index.html">Ana Sayfa</a>
            <div class="pill">Puan: <span id="score">0</span></div>
        </div>

        <section class="arena" aria-label="Çikit oyun alanı">
            <img class="short-stick" id="shortStick" src="images/sopa_kisa-animation 1-000.png" alt="">
            <img class="long-stick" id="longStick" src="images/sopa_uzun-animation 1-000.png" alt="">
        </section>

        <section class="controls" aria-label="Oyun kontrolleri">
            <div class="meter" aria-hidden="true">
                <div class="meter-fill" id="meterFill"></div>
            </div>
            <button class="hit-button" id="hitButton" type="button">VUR</button>
            <div class="message" id="message">Güç dolarken doğru anda vur.</div>
        </section>
    </main>

    <script>
        const meterFill = document.getElementById("meterFill");
        const hitButton = document.getElementById("hitButton");
        const message = document.getElementById("message");
        const scoreNode = document.getElementById("score");
        const shortStick = document.getElementById("shortStick");
        const longStick = document.getElementById("longStick");

        let score = 0;
        let power = 0;
        let direction = 1;
        let locked = false;

        function tick() {
            if (!locked) {
                power += direction * 1.6;
                if (power >= 100 || power <= 0) {
                    direction *= -1;
                    power = Math.max(0, Math.min(100, power));
                }
                meterFill.style.width = `${power}%`;
            }
            requestAnimationFrame(tick);
        }

        function hit() {
            if (locked) {
                return;
            }

            locked = true;
            longStick.classList.add("is-swinging");
            shortStick.style.setProperty("--flight", `${Math.round((power - 50) * 5)}px`);
            shortStick.classList.add("is-flying");

            const gained = Math.max(1, Math.round(power / 10));
            score += gained;
            scoreNode.textContent = score;
            message.textContent = power > 76 ? "Güçlü vuruş!" : power > 42 ? "İyi vuruş!" : "Daha güçlü dene.";

            setTimeout(() => {
                longStick.classList.remove("is-swinging");
                shortStick.classList.remove("is-flying");
                locked = false;
            }, 900);
        }

        hitButton.addEventListener("click", hit);
        tick();
    </script>
</body>
</html>
